<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>발표 대본</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2128;
  --text: #e6edf3;
  --text2: #8b949e;
  --green: #39d353;
  --yellow: #f0c000;
  --pink: #f778ba;
  --blue: #58a6ff;
  --border: #30363d;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%; height: 100%;
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  touch-action: pan-y;
  user-select: none;
  -webkit-user-select: none;
}

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: rgba(13,17,23,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  padding: 0 16px;
  padding-top: env(safe-area-inset-top, 0);
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
}

.header-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--green);
  font-weight: 600;
  letter-spacing: 1px;
}

.slide-indicator {
  display: flex;
  align-items: center;
  gap: 12px;
}

.slide-indicator .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  color: var(--text2);
  font-weight: 600;
}

.nav-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: 0.15s;
}

.nav-btn:active {
  background: var(--green);
  color: var(--bg);
  transform: scale(0.92);
}

/* ===== PROGRESS ===== */
.progress {
  height: 3px;
  background: var(--border);
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--yellow));
  transition: width 0.3s ease;
}

/* ===== SYNC STATUS ===== */
.sync-status {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0) + 56px);
  left: 0; right: 0;
  text-align: center;
  padding: 8px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  z-index: 99;
  transition: 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.sync-status.connected {
  background: rgba(57,211,83,0.1);
  color: var(--green);
  border-bottom: 1px solid rgba(57,211,83,0.2);
}

.sync-status.disconnected {
  background: rgba(22,27,34,0.95);
  color: var(--text2);
  border-bottom: 1px solid var(--border);
}

.sync-status.connecting {
  background: rgba(240,192,0,0.1);
  color: var(--yellow);
  border-bottom: 1px solid rgba(240,192,0,0.2);
}

.pin-input {
  width: 72px;
  padding: 4px 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  text-align: center;
  letter-spacing: 4px;
  outline: none;
  -webkit-appearance: none;
}

.pin-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 8px rgba(57,211,83,0.3);
}

.pin-btn {
  padding: 4px 14px;
  background: var(--green);
  border: none;
  border-radius: 6px;
  color: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.sync-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}

.connected .sync-dot { background: var(--green); animation: pulse 2s infinite; }
.disconnected .sync-dot { background: var(--pink); }

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.3; }
}

/* ===== MAIN CONTENT ===== */
.main {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0) + 80px);
  bottom: calc(env(safe-area-inset-bottom, 0) + 64px);
  left: 0;
  right: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

.script-card {
  padding: 24px 20px;
  min-height: 100%;
  display: flex;
  flex-direction: column;
}

/* Section label */
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--green);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.section-label::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}

.section-title {
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 6px;
  line-height: 1.3;
}

.section-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 20px;
  padding: 4px 10px;
  background: var(--bg2);
  border-radius: 4px;
  display: inline-block;
}

/* Script text */
.script-body {
  font-size: 17px;
  line-height: 2.1;
  color: var(--text);
  flex: 1;
}

.script-body .cue {
  display: block;
  color: var(--yellow);
  font-weight: 700;
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 8px;
  padding: 8px 12px;
  background: rgba(240,192,0,0.08);
  border-left: 3px solid var(--yellow);
  border-radius: 0 6px 6px 0;
}

.script-body .pause {
  display: inline-block;
  color: var(--pink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: rgba(247,120,186,0.08);
  padding: 2px 8px;
  border-radius: 4px;
  margin: 4px 0;
}

.script-body strong {
  color: var(--green);
  font-weight: 700;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(22,27,34,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom, 0);
  z-index: 100;
}

.bottom-nav-inner {
  display: flex;
  height: 60px;
}

.bottom-half {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: 0.15s;
}

.bottom-half:active {
  background: rgba(57,211,83,0.1);
}

.bottom-half.prev {
  color: var(--text2);
  border-right: 1px solid var(--border);
}

.bottom-half.next {
  color: var(--green);
}

.bottom-half .arrow {
  font-size: 20px;
}

.bottom-half .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  opacity: 0.7;
}

/* ===== SWIPE HINT ===== */
.swipe-hint {
  text-align: center;
  padding: 32px 20px;
  color: var(--text2);
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <span class="header-title">SCRIPT</span>
    <div class="slide-indicator">
      <button class="nav-btn" id="btnPrev" aria-label="Previous">&larr;</button>
      <span class="num" id="slideNum">1/14</span>
      <button class="nav-btn" id="btnNext" aria-label="Next">&rarr;</button>
    </div>
  </div>
  <div class="progress">
    <div class="progress-fill" id="progressFill" style="width:7.14%;"></div>
  </div>
</div>

<!-- Sync Status -->
<div class="sync-status disconnected" id="syncStatus">
  <span class="sync-dot"></span>
  <span>PIN:</span>
  <input type="tel" class="pin-input" id="pinInput" maxlength="4" placeholder="0000" inputmode="numeric" pattern="[0-9]*">
  <button class="pin-btn" id="pinBtn" onclick="connectPin()">CONNECT</button>
</div>

<!-- Main Script Content -->
<div class="main" id="mainContent">
  <div class="script-card" id="scriptCard">
    <div class="section-label" id="sectionLabel">SLIDE 01</div>
    <h2 class="section-title" id="sectionTitle">타이틀</h2>
    <span class="section-time" id="sectionTime">약 40초</span>
    <div class="script-body" id="scriptBody"></div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <div class="bottom-half prev" id="bottomPrev">
      <span class="arrow">&larr;</span>
      <span class="label">PREV</span>
    </div>
    <div class="bottom-half next" id="bottomNext">
      <span class="label">NEXT</span>
      <span class="arrow">&rarr;</span>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ===== DATA =====
  const slideData = [
    { label: 'SLIDE 01', title: '말도 안 되는 소리', time: '약 40초',
      script: `<span class="cue">[인사 / 충격 오프닝]</span>안녕하세요, 미디어커뮤니케이션학과 홍재영입니다. 오늘 발표를 인용 하나로 시작하겠습니다.\n\n1977년, 세계 2위 컴퓨터 회사 DEC의 회장 <strong>켄 올슨</strong>이 이런 말을 했습니다.\n\n<strong>"개인이 컴퓨터를 집에 둘 이유가 없다."</strong>\n\n당시에는 합리적인 판단이었죠. 컴퓨터는 건물 한 층을 차지하는 산업용 기계였으니까요.\n\n그런데 4년 뒤, IBM이 개인용 PC를 내놓습니다. 첫 해에만 <strong>100만 대</strong>가 팔렸습니다.\n\n'말도 안 되는 소리'가 현실이 된 겁니다.` },

    { label: 'SLIDE 02', title: '반복되는 패턴', time: '약 45초',
      script: `<span class="cue">[기술 민주화 역사]</span>이런 일은 예전부터 계속 반복됐습니다.\n\n사진을 보죠. 1839년, 사진 한 장 찍는데 한 달 월급이 들었습니다. 30분간 가만히 앉아있어야 했고요. 그런데 1900년, 코닥이 1달러짜리 카메라를 내놓습니다. 슬로건이 뭐였냐면, <strong>'You press the button, we do the rest.'</strong> 버튼만 누르세요, 나머지는 저희가.\n\n음악도 마찬가지입니다. 1980년대에는 녹음실을 빌려야 음악을 만들 수 있었는데, 2004년 스티브 잡스가 <strong>개러지밴드</strong>를 무료로 풀면서 누구나 음악을 만들 수 있게 됐습니다.\n\n영상은요? 방송국만의 영역이었죠. 그런데 2005년 유튜브가 나왔고, 그 결과가 뭐냐면 — 지금 여러분이 영상제작워크샵이라는 수업에 앉아 있는 겁니다.\n\n패턴이 보이시죠? <strong>산업재가 소비재가 되는 겁니다.</strong>\n\n그리고 2025년, 코딩에도 같은 일이 일어나고 있습니다.` },

    { label: 'SLIDE 03', title: 'Vibe Coding', time: '약 45초',
      script: `<span class="cue">[바이브코딩 소개]</span>2025년 2월 2일, 테슬라 AI 총괄 출신이자 OpenAI 공동 창립자인 <strong>안드레이 카르파시</strong>가 트윗 하나를 올립니다.\n\n<strong>'Vibe Coding이라는 새로운 코딩이 있다. 코드가 있다는 사실 자체를 잊어버려라.'</strong>\n\n바이브 코딩. 코드를 직접 쓰지 않고, AI에게 자연어로 설명해서 소프트웨어를 만드는 방식입니다.\n\n이게 장난감 수준이 아닙니다. 그는 이렇게도 말했습니다.\n\n<strong>'가장 핫한 새 프로그래밍 언어는 영어다.'</strong>\n\n즉, 이제 개발 도구가 산업재에서 소비재로 넘어온 겁니다. 코딩을 모르는 사람도 말로 앱을 만들 수 있는 시대.` },

    { label: 'SLIDE 04', title: '그래서 뭘 만들 수 있는데?', time: '약 35초',
      script: `<span class="cue">[분기점]</span>자, 코딩 모르는 사람이 AI로 앱을 만들 수 있다.\n\n그런데 뭘 만들죠?\n\n유용한 걸 만들면? 그건 스타트업이죠. 투자 받고, 사업계획서 쓰고.\n\n근데... <strong>쓸데없는 걸 만들면?</strong>\n\n<span class="pause">[잠깐 멈춤]</span>\n\n쓸데없는 걸 만드는 과정 자체가 재밌으면?\n\n그게 콘텐츠가 되면?` },

    { label: 'SLIDE 05', title: '고백', time: '약 35초',
      script: `<span class="cue">[개인 고백]</span>여기서 고백 하나 하겠습니다.\n\n저는 코딩을 모릅니다. 진짜로요. <strong>Python Hello World도 혼자서 못 짭니다.</strong>\n\n근데 저는 쓸데없는 아이디어가 넘칩니다.\n\n헤어진 여자친구랑 절대 마주치지 않게 해주는 앱.\n내 과제가 AI가 쓴 건지 교수님보다 먼저 감별하는 앱.\n잔고 바닥나면 부모님한테 자동으로 안부 카톡 보내는 앱.\n\n코딩은 모르지만 이런 아이디어는 끝도 없이 나옵니다.\n\n이걸 합치면 어떻게 되냐면요—` },

    { label: 'SLIDE 06', title: '쓸데없는앱연구소', time: '약 40초',
      script: `<span class="cue">[채널 공개]</span>그래서 채널을 만들려고 합니다.\n\n<strong>쓸데없는앱연구소.</strong>\n\n로그라인은 이겁니다. <strong>코딩을 모르는 대학생이, AI에게 말로만 시켜서, 세상에서 가장 쓸데없는 앱을 만들어보는 채널.</strong>\n\n저는 이 채널에서 개발자가 아닙니다. 실험자입니다. 기술은 진지하게 쓰되, 결과물은 철저하게 쓸데없는.\n\nIT 기술 채널의 정보력에, 예능의 웃음을 결합하는 겁니다.\n\n호소다 다카히로가 말한 컨셉의 정의, '전체를 관통하는 새로운 관점' — 이 채널의 관점은 <strong>'기술의 민주화를 유머로 증명한다'</strong>입니다.` },

    { label: 'SLIDE 07', title: '이게 왜 되냐면', time: '약 55초',
      script: `<span class="cue">[전략적 포지셔닝]</span>재밌는 아이디어 같죠? 근데 전략적으로도 맞는 이유가 있습니다.\n\n이 포지셔닝 맵을 보시면요. IT/코딩 채널은 많습니다. 코딩애플, 노마드코더 — 다 교육 중심이에요. 예능 채널도 많죠. 침착맨, 피식대학 — 근데 코딩은 안 다뤄요.\n\n긱블이 가장 가까운데, 긱블은 하드웨어입니다. <strong>소프트웨어를 예능으로 다루는 채널? 이 빈 자리가 블루오션입니다.</strong>\n\n배드BAD의 유튜브 컨셉 프레임워크로 보면요. 대의명분은 <strong>기술의 민주화</strong>. 구원자는 '나도 만들어볼 수 있겠다'는 창작 욕구 자극. 의외성은 쓸모없는 앱을 진지하게 만드는 아이러니. 스피커는 코딩을 모르는 사람이 앱을 만드는 역설이 만드는 매력.\n\n그리고 타겟은 <strong>Generation C</strong> — 디지털 네이티브이면서 콘텐츠로 세상을 배우는 세대입니다.` },

    { label: 'SLIDE 08', title: '에피소드 구조', time: '약 55초',
      script: `<span class="cue">[5단계 포맷]</span>채널 컨셉은 알겠는데, 실제 영상 하나가 어떻게 흘러가냐. 5단계입니다.\n\nEP.01 '깨진 CC 회피 앱'으로 설명하면요.\n\n<strong>1단계 문제 발견</strong> — 같은 학교, 같은 동네. 헤어졌는데 편의점에서 마주칩니다.\n\n<strong>2단계 기획</strong> — GPS로 전 여친 접근하면 경고해주는 앱을 만들기로 합니다.\n\n<strong>3단계 바이브코딩</strong> — AI한테 말로 설명합니다. '위치 API 써서 500m 이내면 경고해줘.' 여기서 삽질이 시작됩니다. 이게 콘텐츠입니다.\n\n<strong>4단계 시연</strong> — 친구한테 전 여친 역할 시키고 실제 GPS로 테스트합니다.\n\n<strong>5단계 쓸모 판정</strong> — 전 여친은 피했는데 새 여친은 언제 생기냐? 별 ?개.\n\n이 구조가 매회 반복되고, 시청자는 공감에서 호기심, 몰입, 놀라움, 만족으로 이어지는 <strong>감정 곡선</strong>을 경험합니다.` },

    { label: 'SLIDE 09', title: '쇼츠가 마중물입니다', time: '약 35초',
      script: `<span class="cue">[쇼츠 전략]</span>좋은 콘텐츠를 만들어도 아무도 안 보면 소용없죠.\n\n그래서 <strong>쇼츠를 마중물</strong>로 씁니다. 본편에서 가장 웃긴 순간, AI가 가장 미쳐날뛰는 장면 — 30초로 잘라서 쇼츠로 뿌립니다.\n\n쇼츠에서 '이 앱 뭐야?'가 되면 본편으로 유입되는 거죠.\n\n이 구조에서 <strong>쇼츠는 광고이고, 본편은 상품</strong>입니다.\n\n같은 영상을 틱톡, 인스타 릴스에도 동시 업로드해서 플랫폼 간 시너지를 만듭니다.` },

    { label: 'SLIDE 10', title: '수익 구조', time: '약 40초',
      script: `<span class="cue">[수익모델]</span>당연히 나올 질문이죠. 돈은 어떻게 버냐.\n\n단기적으로는 <strong>유튜브 광고 수익</strong>입니다. IT/테크 카테고리 CPM이 20~40달러로 일반 카테고리의 2~4배입니다.\n\n중기적으로는 <strong>AI 도구 기업 제휴 마케팅</strong>이 자연스럽습니다. 실제로 쓰는 도구를 소개하는 거라 광고 거부감이 없고, '이번 하찮은 앱은 이 도구 후원으로 만들었습니다' — 포맷에 자연 통합됩니다. 라이브 바이브코딩에서 슈퍼챗도 기대할 수 있고요.\n\n장기적으로는 <strong>유료 멤버십과 바이브코딩 입문 강좌</strong>로 확장합니다.\n\n총 7가지 수익 모델을 채널 성장 단계에 맞춰 순차적으로 여는 구조입니다.` },

    { label: 'SLIDE 11', title: '4단계 로드맵', time: '약 40초',
      script: `<span class="cue">[로드맵]</span>실제 제작 로드맵입니다.\n\n<strong>Phase 1</strong>, 기획 정리는 이미 완료했습니다. 지금 이 발표가 그 결과물이고요.\n\n<strong>Phase 2</strong>, 4주차부터 파일럿 2편을 제작합니다. 5~6분씩, 누적 10~12분.\n\n<strong>Phase 3</strong>, 반응 좋은 포맷을 중심으로 본편 2편을 6~7분으로 확장해 누적 22~26분.\n\n<strong>Phase 4</strong>, 결산형 1편으로 최종 30분 이상을 확보합니다.\n\n일정이 밀리더라도 결산편 길이를 조정해서 <strong>30분은 반드시 넘기도록</strong> 설계했습니다.` },

    { label: 'SLIDE 12', title: 'EP.01 미리보기', time: '약 45초',
      script: `<span class="cue">[에피소드 1 구성안]</span>EP.01을 좀 더 구체적으로 보여드리겠습니다.\n\n제목은 <strong>'헤어진 여자친구랑 절대 마주치지 않게 해주는 앱 만들어봤습니다'</strong>, 총 5분 30초입니다.\n\n인트로에서 터미널 타이핑으로 문제를 제시하고, 타이틀 시퀀스 후 헤어진 커플의 어색한 조우를 재현합니다.\n\n시그니처 대사 <strong>'대딸깍의 시대, 제가 해결해보겠습니다'</strong>와 함께 기획으로 넘어가고, 핵심인 바이브코딩 파트에서 약 2분 30초간 AI와 씨름합니다.\n\n친구한테 전 여친 역할 시키고 GPS 접근 실험, 쓸모 판정으로 마무리.\n\n이 과정에서 나오는 삽질, 리액션, 결과물의 황당함 — 이게 전부 콘텐츠입니다.` },

    { label: 'SLIDE 13', title: '이게 진짜 되는 이유', time: '약 40초',
      script: `<span class="cue">[서사 마무리]</span>아까 1977년 이야기로 시작했죠.\n\n컴퓨터를 집에 두는 게 말도 안 된다고 했던 그때. 영상 제작을 일반인이 한다는 것도 한때는 말도 안 되는 소리였습니다.\n\n지금, '코딩을 모르는 사람이 앱을 만든다'는 것도 누군가에게는 아직 말도 안 되는 소리입니다.\n\n그런데 <strong>그게 되기 시작했고, 그 과정 자체가 콘텐츠가 됩니다.</strong>\n\n기술의 민주화가 만든 틈새, 예능과 IT의 빈 교차점, Vibe Coding이라는 시대 흐름 — 이 세 가지가 겹치는 자리에 <strong>쓸데없는앱연구소</strong>가 있습니다.` },

    { label: 'SLIDE 14', title: '쓸데없는 건 없습니다', time: '약 30초',
      script: `<span class="cue">[감동 클로징]</span>채널 이름이 쓸데없는앱연구소입니다.\n\n근데 솔직히, <strong>쓸데없는 건 없다고 생각합니다.</strong>\n\n쓸데없는 호기심이 개인용 컴퓨터를 만들었고,\n쓸데없는 실험이 유튜브를 만들었고,\n쓸데없는 질문이 AI를 만들었습니다.\n\n저는 그 전통 위에 서서, 가장 쓸데없는 앱을 만들어보겠습니다.\n\n감사합니다.` }
  ];

  const totalSlides = slideData.length;

  // ===== STATE =====
  let currentSlide = 1;
  let peerConn = null;
  let ignoreNextSync = false;

  // ===== DOM =====
  const slideNum = document.getElementById('slideNum');
  const progressFill = document.getElementById('progressFill');
  const sectionLabel = document.getElementById('sectionLabel');
  const sectionTitle = document.getElementById('sectionTitle');
  const sectionTime = document.getElementById('sectionTime');
  const scriptBody = document.getElementById('scriptBody');
  const mainContent = document.getElementById('mainContent');
  const syncStatus = document.getElementById('syncStatus');
  const pinInput = document.getElementById('pinInput');

  // ===== RENDER =====
  function render() {
    const data = slideData[currentSlide - 1];
    slideNum.textContent = currentSlide + '/' + totalSlides;
    progressFill.style.width = ((currentSlide / totalSlides) * 100) + '%';
    sectionLabel.textContent = data.label;
    sectionTitle.textContent = data.title;
    sectionTime.textContent = data.time;
    scriptBody.innerHTML = data.script.replace(/\n\n/g, '<br><br>');
    mainContent.scrollTop = 0;
  }

  function goToSlide(n) {
    if (n < 1 || n > totalSlides) return;
    currentSlide = n;
    render();
    // Sync to PC
    if (!ignoreNextSync && peerConn && peerConn.open) {
      peerConn.send({ type: 'slide', slide: n });
    }
    ignoreNextSync = false;
  }

  // ===== PEERJS SYNC =====
  window.connectPin = function() {
    const pin = pinInput.value.trim();
    if (pin.length !== 4) { pinInput.focus(); return; }

    syncStatus.className = 'sync-status connecting';
    syncStatus.innerHTML = '<span class="sync-dot"></span>CONNECTING...';

    const peer = new Peer(undefined, { debug: 0 });

    peer.on('open', function() {
      const conn = peer.connect('pres-sync-' + pin, { reliable: true });

      conn.on('open', function() {
        peerConn = conn;
        syncStatus.className = 'sync-status connected';
        syncStatus.innerHTML = '<span class="sync-dot"></span>SYNCED \u2014 PIN ' + pin;

        conn.on('data', function(data) {
          if (data && data.type === 'slide' && data.slide !== currentSlide) {
            ignoreNextSync = true;
            goToSlide(data.slide);
          }
        });

        conn.on('close', function() {
          peerConn = null;
          syncStatus.className = 'sync-status disconnected';
          syncStatus.innerHTML = '<span class="sync-dot"></span><span>PIN:</span><input type="tel" class="pin-input" id="pinInput" maxlength="4" value="' + pin + '" inputmode="numeric" pattern="[0-9]*"><button class="pin-btn" onclick="connectPin()">RECONNECT</button>';
        });
      });

      conn.on('error', function() {
        syncStatus.className = 'sync-status disconnected';
        syncStatus.innerHTML = '<span class="sync-dot"></span><span>PIN not found. Retry:</span><input type="tel" class="pin-input" id="pinInput" maxlength="4" value="' + pin + '" inputmode="numeric" pattern="[0-9]*"><button class="pin-btn" onclick="connectPin()">RETRY</button>';
      });
    });

    peer.on('error', function(err) {
      syncStatus.className = 'sync-status disconnected';
      syncStatus.innerHTML = '<span class="sync-dot"></span><span>Error. Retry:</span><input type="tel" class="pin-input" id="pinInput" maxlength="4" value="' + pin + '" inputmode="numeric" pattern="[0-9]*"><button class="pin-btn" onclick="connectPin()">RETRY</button>';
    });
  };

  // Enter key on PIN input
  pinInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); window.connectPin(); }
  });

  // Auto-connect if PIN in URL hash
  if (window.location.hash.length === 5) {
    pinInput.value = window.location.hash.substring(1);
    setTimeout(function() { window.connectPin(); }, 500);
  }

  // ===== EVENTS =====
  document.getElementById('btnPrev').addEventListener('click', function() { goToSlide(currentSlide - 1); });
  document.getElementById('btnNext').addEventListener('click', function() { goToSlide(currentSlide + 1); });
  document.getElementById('bottomPrev').addEventListener('click', function() { goToSlide(currentSlide - 1); });
  document.getElementById('bottomNext').addEventListener('click', function() { goToSlide(currentSlide + 1); });

  // Swipe
  let touchStartX = 0;
  let touchStartY = 0;
  mainContent.addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, { passive: true });

  mainContent.addEventListener('touchend', function(e) {
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) goToSlide(currentSlide + 1);
      else goToSlide(currentSlide - 1);
    }
  }, { passive: true });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goToSlide(currentSlide + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goToSlide(currentSlide - 1); }
  });

  // ===== INIT =====
  render();

})();
</script>
</body>
</html>
